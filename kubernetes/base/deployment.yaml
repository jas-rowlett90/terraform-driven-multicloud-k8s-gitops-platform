apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-reliability-demo-app
  namespace: devops-app
  labels:
    app: k8s-reliability-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-reliability-demo-app
  template:
    metadata:
      labels:
        app: k8s-reliability-demo-app
    spec:
      containers:
        - name: k8s-reliability-demo-app
          image: k8s-reliability-demo-app:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
